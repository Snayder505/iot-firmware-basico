<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard IoT - ESP32</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col justify-between">
  <header class="bg-slate-800 p-5 shadow-lg border-b border-slate-700">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold tracking-wider text-teal-400">
        <i class="fa-solid fa-microchip mr-2"></i>Dashboard Telemetría IoT
      </h1>
      <span class="bg-emerald-500 text-slate-950 px-3 py-1 rounded-full text-xs font-bold animate-pulse">
        <i class="fa-solid fa-circle mr-1"></i>En Vivo
      </span>
    </div>
  </header>
  <main class="container mx-auto p-6 flex-grow">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto">
      <div class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 flex items-center justify-between">
        <div>
          <p class="text-slate-400 font-semibold uppercase text-sm tracking-wider">Temperatura</p>
          <h2 id="temp-val" class="text-5xl font-extrabold mt-2 text-orange-500">-- °C</h2>
        </div>
        <div class="text-5xl text-orange-500/20 bg-orange-500/10 p-4 rounded-full">
          <i class="fa-solid fa-temperature-high animate-bounce"></i>
        </div>
      </div>
      <div class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 flex items-center justify-between">
        <div>
          <p class="text-slate-400 font-semibold uppercase text-sm tracking-wider">Humedad</p>
          <h2 id="hum-val" class="text-5xl font-extrabold mt-2 text-cyan-400">-- %</h2>
        </div>
        <div class="text-5xl text-cyan-400/20 bg-cyan-400/10 p-4 rounded-full">
          <i class="fa-solid fa-droplet animate-pulse"></i>
        </div>
      </div>
    </div>
    <div class="max-w-4xl mx-auto mt-6 bg-slate-800/50 border border-slate-700/50 p-4 rounded-xl text-center">
      <p class="text-slate-400 text-sm">
        ID Dispositivo: <span id="disp-id" class="text-teal-400 font-mono font-bold">--</span> | 
        Última actualización: <span id="last-time" class="text-white font-semibold">--</span>
      </p>
    </div>
  </main>
  <footer class="bg-slate-950 p-4 text-center text-xs text-slate-500 border-t border-slate-900">
    <p>Desarrollado para Monitoreo de Sensores ESP32</p>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Configuración del proyecto de Firebase "iot-esp32-cc83a"
    const firebaseConfig = {
      apiKey: "AIzaSyD-REEMPLAZA-CON-TU-API-KEY-REAL", 
      authDomain: "iot-esp32-cc83a.firebaseapp.com",
      projectId: "iot-esp32-cc83a",
      storageBucket: "iot-esp32-cc83a.appspot.com",
      messagingSenderId: "945163770797",
      appId: "TU-APP-ID-DE-FIREBASE"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const q = query(collection(db, "sensor_data"), orderBy("timestamp", "desc"), limit(1));

    onSnapshot(q, (snapshot) => {
      snapshot.forEach((doc) => {
        const data = doc.data();
        document.getElementById("temp-val").innerText = `${data.temperatura.toFixed(1)} °C`;
        document.getElementById("hum-val").innerText = `${data.humedad.toFixed(1)} %`;
        document.getElementById("disp-id").innerText = data.dispositivoId || "Desconocido";
        if (data.timestamp) {
          const date = data.timestamp.toDate();
          document.getElementById("last-time").innerText = date.toLocaleTimeString();
        }
      });
    });
  </script>
</body>
</html>
